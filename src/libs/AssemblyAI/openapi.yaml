{"openapi":"3.1.0","info":{"title":"API Reference","version":"1.0.0"},"paths":{"/v2/upload":{"post":{"operationId":"upload","summary":"Upload a media file","description":"<llms-only>\n> For the complete documentation index, see [llms.txt](https://www.assemblyai.com/docs/llms.txt)\n</llms-only>\nUpload a media file to AssemblyAI's servers.\n\n<Note>To upload a media file to our EU server, replace `api.assemblyai.com` with `api.eu.assemblyai.com`.</Note>\n<Warning>Requests to transcribe uploaded files must use an API key from the same project as the key that was used to upload the file. If you use an API key from a different project you will get a `403` error and \"Cannot access uploaded file\" message.</Warning>\n","tags":["subpackage_files"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Media file uploaded successfully","content":{"application/json":{"schema":{"$ref":"#/components/schemas/UploadedFile"}}}},"400":{"description":"Bad request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"403":{"description":"Cannot access uploaded file","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"404":{"description":"Not found","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"429":{"description":"Too many requests","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"500":{"description":"An error occurred while processing the request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"503":{"description":"Service unavailable","content":{"application/json":{"schema":{"description":"Any type"}}}},"504":{"description":"Gateway timeout","content":{"application/json":{"schema":{"description":"Any type"}}}}},"requestBody":{"content":{"application/octet-stream":{"schema":{"type":"string","format":"binary"}}}}}},"/v2/transcript":{"post":{"operationId":"submit","summary":"Transcribe audio","description":"<llms-only>\n> For the complete documentation index, see [llms.txt](https://www.assemblyai.com/docs/llms.txt)\n</llms-only>\n<Note>To use our EU server for transcription, replace `api.assemblyai.com` with `api.eu.assemblyai.com`.</Note>\n<Tip>Building a load test or submitting a large batch? [See our guide →](/docs/pre-recorded-audio/guides/bulk-transcription-and-load-tests-at-scale)</Tip>\nCreate a transcript from a media file that is accessible via a URL.\n","tags":["subpackage_transcripts"],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Transcript created and queued for processing","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Transcript"}}}},"400":{"description":"Bad request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"404":{"description":"Not found","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"429":{"description":"Too many requests","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"500":{"description":"An error occurred while processing the request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"503":{"description":"Service unavailable","content":{"application/json":{"schema":{"description":"Any type"}}}},"504":{"description":"Gateway timeout","content":{"application/json":{"schema":{"description":"Any type"}}}}},"requestBody":{"description":"Params to create a transcript","content":{"application/json":{"schema":{"$ref":"#/components/schemas/TranscriptParams"}}}}},"get":{"operationId":"list","summary":"List transcripts","description":"<llms-only>\n> For the complete documentation index, see [llms.txt](https://www.assemblyai.com/docs/llms.txt)\n</llms-only>\n<Note>To retrieve your transcriptions on our EU server, replace `api.assemblyai.com` with `api.eu.assemblyai.com`.</Note>\nRetrieve a list of transcripts you created.\nTranscripts are sorted from newest to oldest and can be retrieved for the last 90 days of usage. The previous URL always points to a page with older transcripts.\n\nIf you need to retrieve transcripts from more than 90 days ago please reach out to our Support team at support@assemblyai.com.\n\n**Pagination**\n\nThis endpoint returns paginated results. The response includes a `page_details` object with the following properties:\n- `page_details.limit` - Maximum number of transcripts per page.\n- `page_details.result_count` - Total number of transcripts returned on the current page.\n- `page_details.current_url` - URL to the current page.\n- `page_details.prev_url` - URL to the previous page of older transcripts.\n- `page_details.next_url` - URL to the next page of newer transcripts.\n","tags":["subpackage_transcripts"],"parameters":[{"name":"limit","in":"query","description":"Maximum amount of transcripts to retrieve","required":false,"schema":{"type":"integer","default":10}},{"name":"status","in":"query","description":"Filter by transcript status","required":false,"schema":{"$ref":"#/components/schemas/TranscriptStatus"}},{"name":"created_on","in":"query","description":"Only get transcripts created on this date","required":false,"schema":{"type":"string","format":"date"}},{"name":"before_id","in":"query","description":"Get transcripts that were created before this transcript ID","required":false,"schema":{"type":"string","format":"uuid"}},{"name":"after_id","in":"query","description":"Get transcripts that were created after this transcript ID","required":false,"schema":{"type":"string","format":"uuid"}},{"name":"throttled_only","in":"query","description":"Only get throttled transcripts, overrides the status filter","required":false,"schema":{"type":"boolean","default":false}},{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"A list of transcripts. Transcripts are sorted from newest to oldest. The previous URL always points to a page with older transcripts.\n","content":{"application/json":{"schema":{"$ref":"#/components/schemas/TranscriptList"}}}},"400":{"description":"Bad request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"404":{"description":"Not found","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"429":{"description":"Too many requests","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"500":{"description":"An error occurred while processing the request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"503":{"description":"Service unavailable","content":{"application/json":{"schema":{"description":"Any type"}}}},"504":{"description":"Gateway timeout","content":{"application/json":{"schema":{"description":"Any type"}}}}}}},"/v2/transcript/{transcript_id}":{"get":{"operationId":"get","summary":"Get transcript","description":"<llms-only>\n> For the complete documentation index, see [llms.txt](https://www.assemblyai.com/docs/llms.txt)\n</llms-only>\n<Note>To retrieve your transcriptions on our EU server, replace `api.assemblyai.com` with `api.eu.assemblyai.com`.</Note>\nGet the transcript resource. The transcript is ready when the \"status\" is \"completed\".\n","tags":["subpackage_transcripts"],"parameters":[{"name":"transcript_id","in":"path","description":"ID of the transcript","required":true,"schema":{"type":"string"}},{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"The transcript resource","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Transcript"}}}},"400":{"description":"Bad request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"404":{"description":"Not found","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"429":{"description":"Too many requests","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"500":{"description":"An error occurred while processing the request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"503":{"description":"Service unavailable","content":{"application/json":{"schema":{"description":"Any type"}}}},"504":{"description":"Gateway timeout","content":{"application/json":{"schema":{"description":"Any type"}}}}}},"delete":{"operationId":"delete","summary":"Delete transcript","description":"<llms-only>\n> For the complete documentation index, see [llms.txt](https://www.assemblyai.com/docs/llms.txt)\n</llms-only>\n<Note>To delete your transcriptions on our EU server, replace `api.assemblyai.com` with `api.eu.assemblyai.com`.</Note>\nRemove the data from the transcript and mark it as deleted.\n<Warning>Files uploaded via the `/upload` endpoint are immediately deleted alongside the transcript when you make a DELETE request, ensuring your data is removed from our systems right away.</Warning>\n","tags":["subpackage_transcripts"],"parameters":[{"name":"transcript_id","in":"path","description":"ID of the transcript","required":true,"schema":{"type":"string"}},{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"The deleted transcript response","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Transcript"}}}},"400":{"description":"Bad request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"404":{"description":"Not found","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"429":{"description":"Too many requests","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"500":{"description":"An error occurred while processing the request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"503":{"description":"Service unavailable","content":{"application/json":{"schema":{"description":"Any type"}}}},"504":{"description":"Gateway timeout","content":{"application/json":{"schema":{"description":"Any type"}}}}}}},"/v2/transcript/{transcript_id}/sentences":{"get":{"operationId":"get-sentences","summary":"Get sentences in transcript","description":"<llms-only>\n> For the complete documentation index, see [llms.txt](https://www.assemblyai.com/docs/llms.txt)\n</llms-only>\n<Note>To retrieve your transcriptions on our EU server, replace `api.assemblyai.com` with `api.eu.assemblyai.com`.</Note>\nGet the transcript split by sentences. The API will attempt to semantically segment the transcript into sentences to create more reader-friendly transcripts.\n","tags":["subpackage_transcripts"],"parameters":[{"name":"transcript_id","in":"path","description":"ID of the transcript","required":true,"schema":{"type":"string"}},{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Exported sentences","content":{"application/json":{"schema":{"$ref":"#/components/schemas/SentencesResponse"}}}},"400":{"description":"Bad request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"404":{"description":"Not found","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"429":{"description":"Too many requests","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"500":{"description":"An error occurred while processing the request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"503":{"description":"Service unavailable","content":{"application/json":{"schema":{"description":"Any type"}}}},"504":{"description":"Gateway timeout","content":{"application/json":{"schema":{"description":"Any type"}}}}}}},"/v2/transcript/{transcript_id}/paragraphs":{"get":{"operationId":"get-paragraphs","summary":"Get paragraphs in transcript","description":"<llms-only>\n> For the complete documentation index, see [llms.txt](https://www.assemblyai.com/docs/llms.txt)\n</llms-only>\n<Note>To retrieve your transcriptions on our EU server, replace `api.assemblyai.com` with `api.eu.assemblyai.com`.</Note>\nGet the transcript split by paragraphs. The API will attempt to semantically segment your transcript into paragraphs to create more reader-friendly transcripts.\n","tags":["subpackage_transcripts"],"parameters":[{"name":"transcript_id","in":"path","description":"ID of the transcript","required":true,"schema":{"type":"string"}},{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Exported paragraphs","content":{"application/json":{"schema":{"$ref":"#/components/schemas/ParagraphsResponse"}}}},"400":{"description":"Bad request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"404":{"description":"Not found","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"429":{"description":"Too many requests","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"500":{"description":"An error occurred while processing the request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"503":{"description":"Service unavailable","content":{"application/json":{"schema":{"description":"Any type"}}}},"504":{"description":"Gateway timeout","content":{"application/json":{"schema":{"description":"Any type"}}}}}}},"/v2/transcript/{transcript_id}/{subtitle_format}":{"get":{"operationId":"get-subtitles","summary":"Get subtitles for transcript","description":"<llms-only>\n> For the complete documentation index, see [llms.txt](https://www.assemblyai.com/docs/llms.txt)\n</llms-only>\n<Note>To retrieve your transcriptions on our EU server, replace `api.assemblyai.com` with `api.eu.assemblyai.com`.</Note>\nExport your transcript in SRT or VTT format to use with a video player for subtitles and closed captions.\n","tags":["subpackage_transcripts"],"parameters":[{"name":"transcript_id","in":"path","description":"ID of the transcript","required":true,"schema":{"type":"string"}},{"name":"subtitle_format","in":"path","description":"The format of the captions","required":true,"schema":{"$ref":"#/components/schemas/SubtitleFormat"}},{"name":"chars_per_caption","in":"query","description":"The maximum number of characters per caption","required":false,"schema":{"type":"integer"}},{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"The exported captions as text","content":{"application/json":{"schema":{"type":"object","properties":{}}}}},"400":{"description":"Bad request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"404":{"description":"Not found","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"429":{"description":"Too many requests","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"500":{"description":"An error occurred while processing the request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"503":{"description":"Service unavailable","content":{"application/json":{"schema":{"description":"Any type"}}}},"504":{"description":"Gateway timeout","content":{"application/json":{"schema":{"description":"Any type"}}}}}}},"/v2/transcript/{transcript_id}/redacted-audio":{"get":{"operationId":"get-redacted-audio","summary":"Get redacted audio","description":"<llms-only>\n> For the complete documentation index, see [llms.txt](https://www.assemblyai.com/docs/llms.txt)\n</llms-only>\n<Note>To retrieve the redacted audio on the EU server, replace `api.assemblyai.com` with `api.eu.assemblyai.com` in the `GET` request above.</Note>\n<Note>Redacted audio files are only available for 24 hours. Make sure to download the file within this time frame.</Note>\nRetrieve the redacted audio object containing the status and URL to the redacted audio.\n","tags":["subpackage_transcripts"],"parameters":[{"name":"transcript_id","in":"path","description":"ID of the transcript","required":true,"schema":{"type":"string"}},{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"The redacted audio object containing the status and URL to the redacted audio","content":{"application/json":{"schema":{"$ref":"#/components/schemas/RedactedAudioResponse"}}}},"400":{"description":"Bad request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"404":{"description":"Not found","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"429":{"description":"Too many requests","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"500":{"description":"An error occurred while processing the request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"503":{"description":"Service unavailable","content":{"application/json":{"schema":{"description":"Any type"}}}},"504":{"description":"Gateway timeout","content":{"application/json":{"schema":{"description":"Any type"}}}}}}},"/v2/transcript/{transcript_id}/word-search":{"get":{"operationId":"word-search","summary":"Search words in transcript","description":"<llms-only>\n> For the complete documentation index, see [llms.txt](https://www.assemblyai.com/docs/llms.txt)\n</llms-only>\n<Note>To search through a transcription created on our EU server, replace `api.assemblyai.com` with `api.eu.assemblyai.com`.</Note>\nSearch through the transcript for keywords. You can search for individual words, numbers, or phrases containing up to five words or numbers.\n","tags":["subpackage_transcripts"],"parameters":[{"name":"transcript_id","in":"path","description":"ID of the transcript","required":true,"schema":{"type":"string"}},{"name":"words","in":"query","description":"Keywords to search for","required":true,"schema":{"type":"array","items":{"type":"string"}}},{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Word search response","content":{"application/json":{"schema":{"$ref":"#/components/schemas/WordSearchResponse"}}}},"400":{"description":"Bad request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"401":{"description":"Unauthorized","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"404":{"description":"Not found","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"429":{"description":"Too many requests","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"500":{"description":"An error occurred while processing the request","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"503":{"description":"Service unavailable","content":{"application/json":{"schema":{"description":"Any type"}}}},"504":{"description":"Gateway timeout","content":{"application/json":{"schema":{"description":"Any type"}}}}}}},"/chat/completions":{"post":{"operationId":"create-chat-completion","summary":"Create a chat completion","description":"<llms-only>\n> For the complete documentation index, see [llms.txt](https://www.assemblyai.com/docs/llms.txt)\n</llms-only>\n\n<Note>To use our EU server for LLM Gateway, replace `llm-gateway.assemblyai.com` with `llm-gateway.eu.assemblyai.com`.</Note>\n\nGenerates a response from a model given a prompt or a series of messages.","tags":[""],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Successful response containing the model's choices.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Response"}}}}},"requestBody":{"description":"Request body for creating a chat completion.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/LLMGatewayRequest"}}}}}},"/understanding":{"post":{"operationId":"create-speech-understanding","summary":"Process speech understanding","description":"<llms-only>\n> For the complete documentation index, see [llms.txt](https://www.assemblyai.com/docs/llms.txt)\n</llms-only>\n\n<Note>To use our EU server for LLM Gateway, replace `llm-gateway.assemblyai.com` with `llm-gateway.eu.assemblyai.com`.</Note>\n\nPerform various speech understanding tasks like [Translation](https://www.assemblyai.com/docs/speech-understanding/translation), [Speaker Identification](https://www.assemblyai.com/docs/speech-understanding/speaker-identification), and [Custom Formatting](https://www.assemblyai.com/docs/speech-understanding/custom-formatting).","tags":[""],"parameters":[{"name":"Authorization","in":"header","required":true,"schema":{"type":"string"}}],"responses":{"200":{"description":"Successful response containing the speech understanding results.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/createSpeechUnderstanding_Response_200"}}}}},"requestBody":{"description":"Request body for speech understanding tasks.","content":{"application/json":{"schema":{"$ref":"#/components/schemas/UnderstandingRequest"}}}}}},"/v3/token":{"get":{"operationId":"generate-streaming-token","summary":"Generate temporary streaming token","description":"<llms-only>\n> For the complete documentation index, see [llms.txt](https://www.assemblyai.com/docs/llms.txt)\n</llms-only>\nGenerates a temporary authentication token for use with streaming services. See [Authenticate with a temporary token](https://www.assemblyai.com/docs/streaming/authenticate-with-a-temporary-token) for more details.\n","tags":["subpackage_streamingApi"],"parameters":[{"name":"expires_in_seconds","in":"query","description":"The desired expiration time for the token in seconds.\n","required":true,"schema":{"type":"integer"}},{"name":"max_session_duration_seconds","in":"query","description":"The desired maximum duration for the session started using this token in seconds.\n","required":false,"schema":{"type":"integer","default":10800}}],"responses":{"200":{"description":"Successfully generated temporary token","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Streaming API_generateStreamingToken_Response_200"}}}},"400":{"description":"Bad Request - Invalid parameters","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"401":{"description":"Unauthorized - Invalid or missing API key","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"429":{"description":"Too Many Requests - Rate limit exceeded","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}},"500":{"description":"Internal Server Error","content":{"application/json":{"schema":{"$ref":"#/components/schemas/Error"}}}}}}}},"servers":[{"url":"https://api.assemblyai.com"},{"url":"https://llm-gateway.assemblyai.com/v1"},{"url":"https://streaming.assemblyai.com"}],"components":{"schemas":{"UploadedFile":{"type":"object","properties":{"upload_url":{"type":"string","format":"url","description":"A URL that points to your audio file, accessible only by AssemblyAI's servers\n"}},"required":["upload_url"],"title":"UploadedFile"},"ErrorDetails":{"type":"object","properties":{},"description":"Additional error details if available","title":"ErrorDetails"},"Error":{"type":"object","properties":{"error":{"type":"string","description":"Error message describing what went wrong"},"code":{"type":"string","description":"Error code for programmatic handling"},"details":{"$ref":"#/components/schemas/ErrorDetails","description":"Additional error details if available"}},"required":["error"],"title":"Error"},"TranscriptCustomSpelling":{"type":"object","properties":{"from":{"type":"array","items":{"type":"string"},"description":"Words or phrases to replace"},"to":{"type":"string","description":"Word to replace with"}},"required":["from","to"],"description":"Object containing words or phrases to replace, and the word or phrase to replace with","title":"TranscriptCustomSpelling"},"TranscriptLanguageCode":{"type":"string","enum":["en","en_au","en_uk","en_us","es","fr","de","it","pt","nl","af","sq","am","ar","hy","as","az","ba","eu","be","bn","bs","br","bg","my","ca","zh","hr","cs","da","et","fo","fi","gl","ka","el","gu","ht","ha","haw","he","hi","hu","is","id","ja","jw","kn","kk","km","ko","lo","la","lv","ln","lt","lb","mk","mg","ms","ml","mt","mi","mr","mn","ne","no","nn","oc","pa","ps","fa","pl","ro","ru","sa","sr","sn","sd","si","sk","sl","so","su","sw","sv","tl","tg","ta","tt","te","th","bo","tr","tk","uk","ur","uz","vi","cy","yi","yo"],"description":"The language of your audio file. Possible values are found in [Supported Languages](https://www.assemblyai.com/docs/pre-recorded-audio/supported-languages).\nThe default value is 'en_us'.\n","title":"TranscriptLanguageCode"},"TranscriptOptionalParamsLanguageDetectionOptions":{"type":"object","properties":{"expected_languages":{"type":"array","items":{"type":"string"},"description":"List of languages expected in the audio file. Defaults to `[\"all\"]` when unspecified. See [Automatic Language Detection](https://www.assemblyai.com/docs/pre-recorded-audio/language-detection) for more details."},"fallback_language":{"type":"string","default":"auto","description":"If the detected language of the audio file is not in the list of expected languages, the `fallback_language` is used. Specify `[\"auto\"]` to let our model choose the fallback language from `expected_languages` with the highest confidence score. See [Automatic Language Detection](https://www.assemblyai.com/docs/pre-recorded-audio/language-detection) for more details.\n"},"code_switching":{"type":"boolean","default":false,"description":"Whether [code switching](/docs/speech-to-text/pre-recorded-audio/code-switching) should be detected.\n"},"code_switching_confidence_threshold":{"type":"number","format":"double","default":0.3,"description":"The confidence threshold for [code switching](/docs/speech-to-text/pre-recorded-audio/code-switching) detection. If the code switching confidence is below this threshold, the transcript will be processed in the language with the highest `language_detection_confidence` score.\n"}},"description":"Specify options for [Automatic Language Detection](https://www.assemblyai.com/docs/pre-recorded-audio/language-detection).","title":"TranscriptOptionalParamsLanguageDetectionOptions"},"TranscriptOptionalParamsRedactPiiAudioOptionsOverrideAudioRedactionMethod":{"type":"string","enum":["silence"],"description":"Specify the method used to redact audio. By default, redacted audio uses a beep sound. Set to `silence` to replace PII with silence instead of a beep.","title":"TranscriptOptionalParamsRedactPiiAudioOptionsOverrideAudioRedactionMethod"},"TranscriptOptionalParamsRedactPiiAudioOptions":{"type":"object","properties":{"return_redacted_no_speech_audio":{"type":"boolean","default":false,"description":"By default, audio redaction provides redacted audio URLs only when speech is detected. However, if your use-case specifically requires redacted audio files even for silent audio files without any dialogue, you can opt to receive these URLs by setting this parameter to `true`."},"override_audio_redaction_method":{"$ref":"#/components/schemas/TranscriptOptionalParamsRedactPiiAudioOptionsOverrideAudioRedactionMethod","description":"Specify the method used to redact audio. By default, redacted audio uses a beep sound. Set to `silence` to replace PII with silence instead of a beep."}},"description":"Specify options for [PII redacted audio](https://www.assemblyai.com/docs/pii-redaction#request-for-redacted-audio) files.","title":"TranscriptOptionalParamsRedactPiiAudioOptions"},"RedactPiiAudioQuality":{"type":"string","enum":["mp3","wav"],"description":"Controls the filetype of the audio created by redact_pii_audio. Currently supports mp3 (default) and wav. See [PII redaction](https://www.assemblyai.com/docs/pii-redaction#request-for-redacted-audio) for more details.","title":"RedactPiiAudioQuality"},"PiiPolicy":{"type":"string","enum":["account_number","banking_information","blood_type","credit_card_cvv","credit_card_expiration","credit_card_number","date","date_interval","date_of_birth","drivers_license","drug","duration","email_address","event","filename","gender_sexuality","healthcare_number","injury","ip_address","language","location","marital_status","medical_condition","medical_process","money_amount","nationality","number_sequence","occupation","organization","passport_number","password","person_age","person_name","phone_number","physical_attribute","political_affiliation","religion","statistics","time","url","us_social_security_number","username","vehicle_id","zodiac_sign"],"description":"The type of PII to redact","title":"PiiPolicy"},"SubstitutionPolicy":{"type":"string","enum":["entity_name","hash"],"description":"The replacement logic for detected PII, can be `entity_name` or `hash`. See [PII redaction](https://www.assemblyai.com/docs/pii-redaction) for more details.","title":"SubstitutionPolicy"},"TranscriptOptionalParamsSpeakerOptions":{"type":"object","properties":{"min_speakers_expected":{"type":"integer","default":1,"description":"The minimum number of speakers expected in the audio file. See [Set a range of possible speakers](https://www.assemblyai.com/docs/pre-recorded-audio/label-speakers#set-a-range-of-possible-speakers) for more details."},"max_speakers_expected":{"type":"integer","description":"<Warning>Setting this parameter too high may hurt model accuracy</Warning>\nThe maximum number of speakers expected in the audio file. The default depends on audio duration: no limit for 0-2 minutes, 10 for 2-10 minutes, and 30 for 10+ minutes. See [Set a range of possible speakers](https://www.assemblyai.com/docs/pre-recorded-audio/label-speakers#set-a-range-of-possible-speakers) for more details.\n"}},"description":"Specify options for [Speaker diarization](https://www.assemblyai.com/docs/pre-recorded-audio/label-speakers#set-a-range-of-possible-speakers). Use this to set a range of possible speakers.","title":"TranscriptOptionalParamsSpeakerOptions"},"SpeechModel":{"type":"string","description":"The speech model to use for the transcription. See [Model Selection](https://www.assemblyai.com/docs/pre-recorded-audio/select-the-speech-model) for available models.","title":"SpeechModel"},"TranslationRequestBodyTranslation":{"type":"object","properties":{"target_languages":{"type":"array","items":{"type":"string"},"description":"List of target language codes (e.g., `[\"es\", \"de\"]`). See [Translation](https://www.assemblyai.com/docs/speech-understanding/translation) for supported languages."},"formal":{"type":"boolea