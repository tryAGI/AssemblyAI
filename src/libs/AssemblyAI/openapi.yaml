www.assemblyai.com/docs/speech-understanding/speaker-identification) for details on each type."},"known_values":{"type":"array","items":{"type":"string"},"description":"Required if speaker_type is \"role\". Each value must be 35 characters or less."},"speakers":{"type":"array","items":{"$ref":"#/components/schemas/SpeakerIdentificationRequestBodySpeakerIdentificationSpeakersItems"},"description":"An array of speaker objects with metadata to improve identification accuracy. Each object should include a `role` or `name` (depending on `speaker_type`) and an optional `description` to help the model identify the speaker. You can also include any additional custom properties (e.g., `company`, `title`) to provide more context. Use this as an alternative to `known_values` when you want to provide additional context about each speaker."}},"required":["speaker_type"],"title":"SpeakerIdentificationRequestBodySpeakerIdentification"},"SpeakerIdentificationRequestBody":{"type":"object","properties":{"speaker_identification":{"$ref":"#/components/schemas/SpeakerIdentificationRequestBodySpeakerIdentification"}},"required":["speaker_identification"],"description":"Request body for [Speaker Identification](https://www.assemblyai.com/docs/speech-understanding/speaker-identification).","title":"SpeakerIdentificationRequestBody"},"CustomFormattingRequestBodyCustomFormatting":{"type":"object","properties":{"date":{"type":"string","description":"Date format pattern (e.g., `\"mm/dd/yyyy\"`). See [Custom Formatting](https://www.assemblyai.com/docs/speech-understanding/custom-formatting) for more details."},"phone_number":{"type":"string","description":"Phone number format pattern (e.g., `\"(xxx)xxx-xxxx\"`). See [Custom Formatting](https://www.assemblyai.com/docs/speech-understanding/custom-formatting) for more details."},"email":{"type":"string","description":"Email format pattern (e.g., `\"username@domain.com\"`). See [Custom Formatting](https://www.assemblyai.com/docs/speech-understanding/custom-formatting) for more details."}},"title":"CustomFormattingRequestBodyCustomFormatting"},"CustomFormattingRequestBody":{"type":"object","properties":{"custom_formatting":{"$ref":"#/components/schemas/CustomFormattingRequestBodyCustomFormatting"}},"required":["custom_formatting"],"description":"Request body for [Custom Formatting](https://www.assemblyai.com/docs/speech-understanding/custom-formatting).","title":"CustomFormattingRequestBody"},"TranscriptOptionalParamsSpeechUnderstandingRequest":{"oneOf":[{"$ref":"#/components/schemas/TranslationRequestBody"},{"$ref":"#/components/schemas/SpeakerIdentificationRequestBody"},{"$ref":"#/components/schemas/CustomFormattingRequestBody"}],"title":"TranscriptOptionalParamsSpeechUnderstandingRequest"},"TranscriptOptionalParamsSpeechUnderstanding":{"type":"object","properties":{"request":{"$ref":"#/components/schemas/TranscriptOptionalParamsSpeechUnderstandingRequest"}},"required":["request"],"description":"Enable speech understanding tasks like [Translation](https://www.assemblyai.com/docs/speech-understanding/translation), [Speaker Identification](https://www.assemblyai.com/docs/speech-understanding/speaker-identification), and [Custom Formatting](https://www.assemblyai.com/docs/speech-understanding/custom-formatting). See the task-specific docs for available options and configuration.\n","title":"TranscriptOptionalParamsSpeechUnderstanding"},"SummaryModel":{"type":"string","enum":["informative","conversational","catchy"],"description":"The model to summarize the transcript","title":"SummaryModel"},"SummaryType":{"type":"string","enum":["bullets","bullets_verbose","gist","headline","paragraph"],"description":"The type of summary","title":"SummaryType"},"TranscriptOptionalParamsRemoveAudioTags":{"type":"string","enum":["all"],"description":"Remove [audio event tags](https://www.assemblyai.com/docs/pre-recorded-audio/universal-3-pro#audio-event-tags) from the transcript text. Set to `\"all\"` to remove all audio tags.\n\nNote: This parameter is only supported for the Universal-3 Pro model.\n","title":"TranscriptOptionalParamsRemoveAudioTags"},"TranscriptParams":{"type":"object","properties":{"audio_end_at":{"type":"integer","description":"The point in time, in milliseconds, to stop transcribing in your media file. See [Set the start and end of the transcript](https://www.assemblyai.com/docs/pre-recorded-audio/set-the-start-and-end-of-the-transcript) for more details."},"audio_start_from":{"type":"integer","description":"The point in time, in milliseconds, to begin transcribing in your media file. See [Set the start and end of the transcript](https://www.assemblyai.com/docs/pre-recorded-audio/set-the-start-and-end-of-the-transcript) for more details."},"auto_chapters":{"type":"boolean","default":false,"description":"Enable [Auto Chapters](https://www.assemblyai.com/docs/speech-understanding/create-summarized-chapters), can be true or false. Deprecated - use [LLM Gateway](https://www.assemblyai.com/docs/llm-gateway/overview) instead for more flexible chapter summaries. See the [updated Auto Chapters page](https://www.assemblyai.com/docs/speech-understanding/create-summarized-chapters) for details.\n\nNote: This parameter is only supported for the Universal-2 model.\n"},"auto_highlights":{"type":"boolean","default":false,"description":"Enable [Key Phrases](https://www.assemblyai.com/docs/speech-understanding/identify-highlights), either true or false"},"content_safety":{"type":"boolean","default":false,"description":"Enable [Content Moderation](https://www.assemblyai.com/docs/content-moderation), can be true or false"},"content_safety_confidence":{"type":"integer","default":50,"description":"The confidence threshold for the [Content Moderation](https://www.assemblyai.com/docs/content-moderation) model. Values must be between 25 and 100."},"custom_spelling":{"type":"array","items":{"$ref":"#/components/schemas/TranscriptCustomSpelling"},"description":"Customize how words are spelled and formatted using to and from values. See [Custom Spelling](https://www.assemblyai.com/docs/pre-recorded-audio/correct-spelling-of-terms) for more details."},"disfluencies":{"type":"boolean","default":false,"description":"Transcribe [Filler Words](https://www.assemblyai.com/docs/pre-recorded-audio/include-filler-words), like \"umm\", in your media file; can be true or false"},"domain":{"type":["string","null"],"description":"Enable domain-specific transcription models to improve accuracy for specialized terminology. Set to `\"medical-v1\"` to enable [Medical Mode](https://www.assemblyai.com/docs/pre-recorded-audio/medical-mode) for improved accuracy of medical terms such as medications, procedures, conditions, and dosages.\n\nSupported languages: English (`en`), Spanish (`es`), German (`de`), French (`fr`). If used with an unsupported language, the parameter is ignored and a warning is returned.\n"},"entity_detection":{"type":"boolean","default":false,"description":"Enable [Entity Detection](https://www.assemblyai.com/docs/speech-understanding/detect-entities-in-transcript), can be true or false"},"filter_profanity":{"type":"boolean","default":false,"description":"Filter profanity from the transcribed text, can be true or false. See [Profanity Filtering](https://www.assemblyai.com/docs/profanity-filtering) for more details."},"format_text":{"type":"boolean","default":true,"description":"Enable [Text Formatting](https://www.assemblyai.com/docs/pre-recorded-audio), can be true or false"},"iab_categories":{"type":"boolean","default":false,"description":"Enable [Topic Detection](https://www.assemblyai.com/docs/speech-understanding/detect-discussion-topics), can be true or false"},"keyterms_prompt":{"type":"array","items":{"type":"string"},"description":"Improve accuracy with up to 200 (for Universal-2) or 1000 (for Universal-3 Pro) domain-specific words or phrases (maximum 6 words per phrase). See [Keyterms Prompting](https://www.assemblyai.com/docs/pre-recorded-audio/keyterms-prompting) for more details.\n"},"language_code":{"oneOf":[{"$ref":"#/components/schemas/TranscriptLanguageCode"},{"type":"null"}],"description":"The language of your audio file. Possible values are found in [Supported Languages](https://www.assemblyai.com/docs/pre-recorded-audio/supported-languages).\nThe default value is 'en_us'.\n"},"language_codes":{"type":["array","null"],"items":{"$ref":"#/components/schemas/TranscriptLanguageCode"},"description":"The language codes of your audio file. Used for [Code switching](/docs/speech-to-text/pre-recorded-audio/code-switching)\nOne of the values specified must be `en`.\n"},"language_confidence_threshold":{"type":"number","format":"double","description":"The confidence threshold for the automatically detected language.\nAn error will be returned if the language confidence is below this threshold.\nDefaults to 0. See [Automatic Language Detection](https://www.assemblyai.com/docs/pre-recorded-audio/language-detection) for more details.\n"},"language_detection":{"type":"boolean","default":false,"description":"Enable [Automatic language detection](https://www.assemblyai.com/docs/pre-recorded-audio/language-detection), either true or false."},"language_detection_options":{"$ref":"#/components/schemas/TranscriptOptionalParamsLanguageDetectionOptions","description":"Specify options for [Automatic Language Detection](https://www.assemblyai.com/docs/pre-recorded-audio/language-detection)."},"multichannel":{"type":"boolean","default":false,"description":"Enable [Multichannel](https://www.assemblyai.com/docs/pre-recorded-audio/transcribe-multiple-audio-channels) transcription, can be true or false."},"prompt":{"type":"string","description":"Provide natural language prompting of up to 1,500 words of contextual information to the model. See the [Prompting Guide](https://www.assemblyai.com/docs/pre-recorded-audio/prompting) for best practices.\n\nNote: This parameter is only supported for the Universal-3 Pro model.\n"},"punctuate":{"type":"boolean","default":true,"description":"Enable [Automatic Punctuation](https://www.assemblyai.com/docs/pre-recorded-audio), can be true or false"},"redact_pii":{"type":"boolean","default":false,"description":"Redact PII from the transcribed text using the Redact PII model, can be true or false. See [PII Redaction](https://www.assemblyai.com/docs/pii-redaction) for more details."},"redact_pii_audio":{"type":"boolean","default":false,"description":"Generate a copy of the original media file with spoken PII \"beeped\" out, can be true or false. See [PII redaction](https://www.assemblyai.com/docs/pii-redaction#request-for-redacted-audio) for more details."},"redact_pii_audio_options":{"$ref":"#/components/schemas/TranscriptOptionalParamsRedactPiiAudioOptions","description":"Specify options for [PII redacted audio](https://www.assemblyai.com/docs/pii-redaction#request-for-redacted-audio) files."},"redact_pii_audio_quality":{"$ref":"#/components/schemas/RedactPiiAudioQuality","description":"Controls the filetype of the audio created by redact_pii_audio. Currently supports mp3 (default) and wav. See [PII redaction](https://www.assemblyai.com/docs/pii-redaction#request-for-redacted-audio) for more details."},"redact_pii_policies":{"type":"array","items":{"$ref":"#/components/schemas/PiiPolicy"},"description":"The list of PII Redaction policies to enable. See [PII redaction](https://www.assemblyai.com/docs/pii-redaction) for more details."},"redact_pii_sub":{"oneOf":[{"$ref":"#/components/schemas/SubstitutionPolicy"},{"type":"null"}],"description":"The replacement logic for detected PII, can be `entity_type` or `hash`. See [PII redaction](https://www.assemblyai.com/docs/pii-redaction) for more details."},"sentiment_analysis":{"type":"boolean","default":false,"description":"Enable [Sentiment Analysis](https://www.assemblyai.com/docs/speech-understanding/analyze-sentiment-of-speech), can be true or false"},"speaker_labels":{"type":"boolean","default":false,"description":"Enable [Speaker diarization](https://www.assemblyai.com/docs/pre-recorded-audio/label-speakers), can be true or false"},"speaker_options":{"$ref":"#/components/schemas/TranscriptOptionalParamsSpeakerOptions","description":"Specify options for [Speaker diarization](https://www.assemblyai.com/docs/pre-recorded-audio/label-speakers#set-a-range-of-possible-speakers). Use this to set a range of possible speakers."},"speakers_expected":{"type":["integer","null"],"description":"Tells the speaker label model how many speakers it should attempt to identify. See [Set number of speakers expected](https://www.assemblyai.com/docs/pre-recorded-audio/label-speakers#set-number-of-speakers-expected) for more details."},"speech_models":{"type":"array","items":{"$ref":"#/components/schemas/SpeechModel"},"description":"List multiple speech models in priority order, allowing our system to automatically route your audio to the best available option. See [Model Selection](https://www.assemblyai.com/docs/pre-recorded-audio/select-the-speech-model) for available models and routing behavior.\n"},"speech_threshold":{"type":["number","null"],"format":"double","description":"Reject audio files that contain less than this fraction of speech.\nValid values are in the range [0, 1] inclusive. See [Speech Threshold](https://www.assemblyai.com/docs/speech-threshold) for more details.\n"},"speech_understanding":{"$ref":"#/components/schemas/TranscriptOptionalParamsSpeechUnderstanding","description":"Enable speech understanding tasks like [Translation](https://www.assemblyai.com/docs/speech-understanding/translation), [Speaker Identification](https://www.assemblyai.com/docs/speech-understanding/speaker-identification), and [Custom Formatting](https://www.assemblyai.com/docs/speech-understanding/custom-formatting). See the task-specific docs for available options and configuration.\n"},"summarization":{"type":"boolean","default":false,"description":"Enable [Summarization](https://www.assemblyai.