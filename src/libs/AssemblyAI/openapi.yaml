le"},"rank":{"type":"number","format":"double","description":"The total relevancy to the overall audio file of this key phrase - a greater number means more relevant"},"text":{"type":"string","description":"The text itself of the key phrase"},"timestamps":{"type":"array","items":{"$ref":"#/components/schemas/Timestamp"},"description":"The timestamp of the of the key phrase"}},"required":["count","rank","text","timestamps"],"title":"AutoHighlightResult"},"AutoHighlightsResult":{"type":"object","properties":{"status":{"$ref":"#/components/schemas/AudioIntelligenceModelStatus","description":"The status of the Key Phrases model. Either success, or unavailable in the rare case that the model failed."},"results":{"type":"array","items":{"$ref":"#/components/schemas/AutoHighlightResult"},"description":"A temporally-sequential array of Key Phrases"}},"required":["status","results"],"description":"An array of results for the Key Phrases model, if it is enabled.\nSee [Key phrases](https://www.assemblyai.com/docs/speech-understanding/identify-highlights) for more information.\n","title":"AutoHighlightsResult"},"Chapter":{"type":"object","properties":{"gist":{"type":"string","description":"An ultra-short summary (just a few words) of the content spoken in the chapter"},"headline":{"type":"string","description":"A single sentence summary of the content spoken during the chapter"},"summary":{"type":"string","description":"A one paragraph summary of the content spoken during the chapter"},"start":{"type":"integer","description":"The starting time, in milliseconds, for the chapter"},"end":{"type":"integer","description":"The starting time, in milliseconds, for the chapter"}},"required":["gist","headline","summary","start","end"],"description":"Chapter of the audio file","title":"Chapter"},"ContentSafetyLabel":{"type":"object","properties":{"label":{"type":"string","description":"The label of the sensitive topic"},"confidence":{"type":"number","format":"double","description":"The confidence score for the topic being discussed, from 0 to 1"},"severity":{"type":"number","format":"double","description":"How severely the topic is discussed in the section, from 0 to 1"}},"required":["label","confidence","severity"],"title":"ContentSafetyLabel"},"ContentSafetyLabelResult":{"type":"object","properties":{"text":{"type":"string","description":"The transcript of the section flagged by the Content Moderation model"},"labels":{"type":"array","items":{"$ref":"#/components/schemas/ContentSafetyLabel"},"description":"An array of safety labels, one per sensitive topic that was detected in the section"},"sentences_idx_start":{"type":"integer","description":"The sentence index at which the section begins"},"sentences_idx_end":{"type":"integer","description":"The sentence index at which the section ends"},"timestamp":{"$ref":"#/components/schemas/Timestamp","description":"Timestamp information for the section"}},"required":["text","labels","sentences_idx_start","sentences_idx_end","timestamp"],"title":"ContentSafetyLabelResult"},"SeverityScoreSummary":{"type":"object","properties":{"low":{"type":"number","format":"double"},"medium":{"type":"number","format":"double"},"high":{"type":"number","format":"double"}},"required":["low","medium","high"],"title":"SeverityScoreSummary"},"ContentSafetyLabelsResult":{"type":"object","properties":{"status":{"$ref":"#/components/schemas/AudioIntelligenceModelStatus","description":"The status of the Content Moderation model. Either success, or unavailable in the rare case that the model failed."},"results":{"type":"array","items":{"$ref":"#/components/schemas/ContentSafetyLabelResult"},"description":"An array of results for the Content Moderation model"},"summary":{"type":"object","additionalProperties":{"type":"number","format":"double"},"description":"A summary of the Content Moderation confidence results for the entire audio file"},"severity_score_summary":{"type":"object","additionalProperties":{"$ref":"#/components/schemas